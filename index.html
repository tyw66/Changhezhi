<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>长河志 | Chronoriver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1></h1>
        <p class="subtitle"></p>
    </header>

    <div class="filter-bar" id="filterBar">
        <div class="site-logo">
            <img src="cover.jpg" alt="长河志" class="logo-image">
            <span class="logo-text">长河志 | Chronoriver</span>
        </div>
        <div class="filter-container">
            <div class="source-select-wrapper">
                <select class="source-select" id="sourceSelect"></select>
            </div>
            <div class="filter-select-wrapper" id="filterSelectWrapper">
                <input type="text" class="filter-input" id="filterInput" readonly placeholder="选择标签筛选">
                <span class="filter-arrow" id="filterArrow">▼</span>
                <div class="filter-dropdown" id="filterDropdown">
                    <div class="filter-dropdown-header">
                        <span class="filter-dropdown-title">标签筛选</span>
                        <span class="filter-dropdown-count" id="filterCount">0 个标签</span>
                    </div>
                    <div class="filter-dropdown-content" id="filterDropdownContent"></div>
                </div>
            </div>
            <div class="filter-clear" id="filterClear" style="display: none;">
                <span>清除</span>
            </div>
        </div>
        <div class="site-slogan">时间长河下的文明</div>
    </div>

    <main class="main-content">
        <div class="timeline-container">
            <div class="timeline-line"></div>
            <div class="timeline-nodes" id="timelineNodes"></div>
        </div>
    </main>

    <footer class="footer">
        <span id="busuanzi_container_uv">本站访客数<span id="busuanzi_value_uv"></span>人</span>
        <p>&copy; 2026 一尾66. Website code All rights reserved. Content for study‑reference only.</p>
    </footer>

    <div class="sidebar" id="sidebar">
        <button class="sidebar-close" id="sidebarClose">×</button>
        <div class="sidebar-content">
            <img class="sidebar-image" id="sidebarImage" src="" alt="" style="display: none;">
            <h2 class="sidebar-name" id="sidebarName"></h2>
            <div class="sidebar-meta">
                <span class="sidebar-date" id="sidebarDate"></span>
                <span class="sidebar-author" id="sidebarAuthor"></span>
            </div>
            <div class="sidebar-tags" id="sidebarTags"></div>
            <p class="sidebar-description" id="sidebarDescription"></p>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <script src="script.js"></script>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>
